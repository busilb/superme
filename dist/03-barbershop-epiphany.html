<p>&quot;三月份装好AI之后，我不知道怎么用，<strong>非常迷茫</strong>。不知道干嘛。&quot;</p>

<blockquote>

<h1 id="%E4%B8%80%E6%AC%A1%E6%99%AE%E9%80%9A%E7%9A%84%E7%90%86%E5%8F%91%E4%B8%80%E4%B8%AA%E4%B8%8D%E6%99%AE%E9%80%9A%E7%9A%84%E6%B4%9E%E5%AF%9F">一次普通的理发，一个不普通的洞察</h1>
<p>一周后，布斯去理发</p>

<li>咸宁老街旁边的社区理发店</li>
<li>理了三年的熟悉师傅</li>

<blockquote>
<p>&quot;哥们儿，你能不能把我近半年的理发记录给我调出来？&quot;</p>
</blockquote>
<p>理发师一脸困惑：&quot;你干什么？&quot;</p>
<blockquote>
<p>&quot;哥，我拍个照片。反正我又不是查账。&quot;</p>
</blockquote>
</section>

<h1 id="%E6%B2%A1%E6%9C%89%E7%B2%BE%E5%BF%83%E8%AE%BE%E8%AE%A1%E7%9A%84prompt%E5%8F%AA%E6%9C%89%E4%B8%80%E5%BC%A0%E6%A8%A1%E7%B3%8A%E7%9A%84%E7%85%A7%E7%89%87">没有精心设计的prompt，只有一张模糊的照片</h1>
<p>布斯拍了理发消费记录的照片</p>
<p>发给AI</p>
<p>就说了一句：<strong>&quot;帮我分析一下&quot;</strong></p>
<p>没有精心设计的prompt</p>
<p>没有专业的数据格式</p>
<p>就是一张手机拍的模糊照片</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-class="section-break" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" class="section-break" data-marpit-pagination="12" style="--paginate:true;--class:section-break;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;" data-marpit-pagination-total="32">
<h1 id="act-3">Act 3</h1>
<h2 id="%E9%9C%87%E6%92%BC">震撼</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="13" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;" data-marpit-pagination-total="32">
<h1 id="ai%E7%9A%84%E7%AC%AC%E4%B8%80%E9%87%8D%E5%9B%9E%E5%BA%94%E6%95%B0%E6%8D%AE%E5%88%86%E6%9E%90">AI的第一重回应：数据分析</h1>
<blockquote>
<p>&quot;布斯，你的平均理发周期是 <strong>25天</strong>，平均每次花费 <strong>35元</strong>。&quot;</p>
</blockquote>
<p>布斯心想：嗯，挺准的</p>
<p>但这我自己算也能算出来……</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;" data-marpit-pagination-total="32">
<h1 id="ai%E7%9A%84%E7%AC%AC%E4%BA%8C%E9%87%8D%E5%9B%9E%E5%BA%94%E4%B8%BB%E5%8A%A8%E8%A7%84%E5%88%92">AI的第二重回应：主动规划</h1>
<blockquote>
<p>&quot;接下来我将为你制定<strong>近半年的理发计划</strong>。&quot;</p>
</blockquote>
<p>等等……我没让你做这个</p>
<p>AI <strong>主动</strong> 延伸了任务</p>
<p>从&quot;分析过去&quot;到&quot;规划未来&quot;</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;" data-marpit-pagination-total="32">
<h1 id="ai%E7%9A%84%E7%AC%AC%E4%B8%89%E9%87%8D%E5%9B%9E%E5%BA%94%E8%87%AA%E5%8A%A8%E6%89%A7%E8%A1%8C">AI的第三重回应：自动执行</h1>
<blockquote>
<p>&quot;你将在你的 iPhone 提醒中，在以下日期收到理发提醒。&quot;</p>
</blockquote>
<p>然后——</p>
<blockquote>
<p>&quot;<strong>噔噔噔</strong>，iPhone上就出来了6条提醒！&quot;</p>
</blockquote>
<p>每隔25天一条，未来半年的理发日程</p>
<p><strong>全部自动设置好了</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;--marpit-advanced-background-split:40%;" data-marpit-pagination-total="32" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;../assets/slide-three-responses.png&quot;);"></figure></div></section></foreignObject><foreignObject width="60%" height="720"><section id="16" data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;--marpit-advanced-background-split:40%;" data-marpit-pagination-total="32" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h1 id="ai%E4%B8%8D%E5%8F%AA%E5%9B%9E%E7%AD%94%E9%97%AE%E9%A2%98%E5%AE%83%E5%88%86%E6%9E%90%E8%A7%84%E5%88%92%E5%B9%B6%E8%87%AA%E5%8A%A8%E6%89%A7%E8%A1%8C">AI不只回答问题——它分析、规划、并自动执行</h1>
<table>
<thead>
<tr>
<th>层级</th>
<th>AI做了什么</th>
<th>超出预期？</th>
</tr>
</thead>
<tbody>
<tr>
<td>第一重</td>
<td><strong>分析</strong> — 提取数据规律</td>
<td>预期内</td>
</tr>
<tr>
<td>第二重</td>
<td><strong>规划</strong> — 主动制定计划</td>
<td>超出预期</td>
</tr>
<tr>
<td>第三重</td>
<td><strong>执行</strong> — 自动创建日历提醒</td>
<td>震撼</td>
</tr>
</tbody>
</table>
<p>大多数人对AI的认知停留在<strong>第一重</strong></p>
<p>理发店案例展示了AI的完整能力链：<strong>分析 → 规划 → 执行</strong></p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="16" style="" data-marpit-pagination-total="32" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;--marpit-advanced-background-split:40%;" data-marpit-pagination-total="32" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;../assets/c3-three-layer-detail.png&quot;);"></figure></div></section></foreignObject><foreignObject width="60%" height="720"><section id="17" data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;--marpit-advanced-background-split:40%;" data-marpit-pagination-total="32" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h1 id="%E4%B8%89%E9%87%8D%E8%83%BD%E5%8A%9B%E6%A8%A1%E5%9E%8B%E8%AF%A6%E8%A7%A3">三重能力模型详解</h1>
<h3 id="%E5%88%86%E6%9E%90%E5%B1%82%E6%95%B0%E6%8D%AE%E6%B4%9E%E5%AF%9F">分析层（数据洞察）</h3>
<p>AI从非结构化数据中提取模式和规律</p>
<h3 id="%E8%A7%84%E5%88%92%E5%B1%82%E4%B8%BB%E5%8A%A8%E5%86%B3%E7%AD%96">规划层（主动决策）</h3>
<p>AI基于分析结果主动延伸任务，制定可执行方案</p>
<h3 id="%E6%89%A7%E8%A1%8C%E5%B1%82%E8%87%AA%E5%8A%A8%E8%A1%8C%E5%8A%A8">执行层（自动行动）</h3>
<p>AI直接操作系统（日历、邮件、应用），将计划变为现实</p>
<p><strong>从被动工具 → 主动助手 → 自动执行者</strong></p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="17" style="" data-marpit-pagination-total="32" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-class="key-takeaway" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" class="key-takeaway" data-marpit-pagination="18" style="--paginate:true;--class:key-takeaway;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;" data-marpit-pagination-total="32">
<h1 id="%E5%85%B3%E9%94%AE%E6%97%B6%E5%88%BB">关键时刻</h1>
<blockquote>
<p>&quot;它不光帮你做了数据的分析，还帮你做了提醒任务的创建。&quot;</p>
<p>&quot;这是我的第一个用AI实现的产品。<strong>我至今都对这个场景有感情。</strong>&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-class="section-break" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" class="section-break" data-marpit-pagination="19" style="--paginate:true;--class:section-break;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;" data-marpit-pagination-total="32">
<h1 id="%E6%95%99%E5%AD%A6%E5%90%AF%E7%A4%BA">教学启示</h1>
<h2 id="%E5%9B%9B%E4%B8%AA%E5%8F%AF%E8%BF%81%E7%A7%BB%E7%9A%84%E5%85%B3%E9%94%AE%E6%95%99%E8%AE%AD">四个可迁移的关键教训</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;" data-marpit-pagination-total="32">
<h1 id="%E6%95%99%E8%AE%AD1%E4%B8%8D%E9%9C%80%E8%A6%81%E5%AE%8F%E5%A4%A7%E5%9C%BA%E6%99%AF">教训1：不需要宏大场景</h1>
<blockquote>
<p>&quot;这个场景已经非常小众了，非常小了。&quot;</p>
</blockquote>
<p>但它是布斯的<strong>突破时刻</strong></p>
<table>
<thead>
<tr>
<th>常见误区</th>
<th>正确姿态</th>
</tr>
</thead>
<tbody>
<tr>
<td>&quot;我要用AI做一个大项目&quot;</td>
<td>从理发记录开始</td>
</tr>
<tr>
<td>&quot;等找到完美场景再用&quot;</td>
<td>随便问一个问题就是开始</td>
</tr>
<tr>
<td>&quot;这种小事不值得用AI&quot;</td>
<td>再小的事都值得试</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="21" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;" data-marpit-pagination-total="32">
<h1 id="%E6%95%99%E8%AE%AD2%E5%85%B3%E9%94%AE%E4%B8%8D%E6%98%AF%E6%8A%80%E6%9C%AF%E6%98%AF%E6%83%B3%E5%88%B0%E9%97%AE%E5%AE%83">教训2：关键不是技术，是&quot;想到问它&quot;</h1>
<blockquote>
<p>&quot;遇到任何事情想解决的时候，有没有想到第一时间问AI？就这么简单。&quot;</p>
</blockquote>
<p>布斯把这叫做 <strong>第一性思维</strong></p>
<table>
<thead>
<tr>
<th>以前</th>
<th>以后</th>
</tr>
</thead>
<tbody>
<tr>
<td>遇到问题 → 问同事</td>
<td>遇到问题 → <strong>先问AI</strong></td>
</tr>
<tr>
<td>不知道怎么做 → 搜百度</td>
<td>不知道怎么做 → <strong>先问AI</strong></td>
</tr>
<tr>
<td>觉得太难 → 放弃</td>
<td>觉得太难 → <strong>先问AI</strong></td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;" data-marpit-pagination-total="32">
<h1 id="%E6%95%99%E8%AE%AD3ai%E4%B8%8D%E5%8F%AA%E6%98%AF%E9%97%AE%E7%AD%94%E5%AE%83%E8%83%BD%E8%A1%8C%E5%8A%A8">教训3：AI不只是问答，它能行动</h1>
<p>理发店案例的核心震撼不是数据分析</p>
<p>而是AI <strong>主动采取了行动</strong> — 创建了日历提醒</p>
<blockquote>
<p>&quot;就像在绿城App里创建了一个工单。这个工单不是人创建的，而是机器人帮你创建的。你说了一句话，它就帮你创建了。&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;--marpit-advanced-background-split:40%;" data-marpit-pagination-total="32" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;../assets/slide-curiosity.png&quot;);"></figure></div></section></foreignObject><foreignObject width="60%" height="720"><section id="23" data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;--marpit-advanced-background-split:40%;" data-marpit-pagination-total="32" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h1 id="%E5%A5%BD%E5%A5%87%E5%BF%83%E6%AF%94prompt%E6%8A%80%E5%B7%A7%E6%9B%B4%E9%87%8D%E8%A6%81">好奇心比prompt技巧更重要</h1>
<p>布斯没有用任何&quot;prompt技巧&quot;</p>
<p>他只是<strong>好奇</strong> — &quot;我的理发周期到底是多久？&quot;</p>
<blockquote>
<p>&quot;好奇心就是松弛状态下的自然表达。&quot;</p>
</blockquote>
<p>不需要学习&quot;prompt工程&quot;</p>
<p>只需要保持<strong>对世界的好奇心</strong></p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="23" style="" data-marpit-pagination-total="32" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-class="section-break" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" class="section-break" data-marpit-pagination="24" style="--paginate:true;--class:section-break;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;" data-marpit-pagination-total="32">
<h1 id="%E4%BD%A0%E7%9A%84%E7%90%86%E5%8F%91%E5%BA%97%E5%9C%A8%E5%93%AA%E9%87%8C">你的理发店在哪里？</h1>
<h2 id="%E7%8E%B0%E5%9C%BA%E5%AE%9E%E6%93%8D">现场实操</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;--marpit-advanced-background-split:40%;" data-marpit-pagination-total="32" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;../assets/slide-your-moment.png&quot;);"></figure></div></section></foreignObject><foreignObject width="60%" height="720"><section id="25" data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;--marpit-advanced-background-split:40%;" data-marpit-pagination-total="32" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h1 id="%E6%89%BE%E5%88%B0%E4%BD%A0%E7%9A%84%E7%90%86%E5%8F%91%E5%BA%97%E6%97%B6%E5%88%BB">找到你的&quot;理发店时刻&quot;</h1>
<h3 id="%E7%8E%B0%E5%9C%A8%E5%B0%B1%E5%81%9A5%E5%88%86%E9%92%9F">现在就做（5分钟）：</h3>
<ol>
<li>拿出手机，打开任意AI应用</li>
<li>拍一张<strong>你身边任何东西</strong>的照片
<ul>
<li>桌上的咖啡收据？</li>
<li>手边的快递单？</li>
<li>今天的会议纪要？</li>
</ul>
</li>
<li>发给AI，问一个你<strong>真正好奇</strong>的问题</li>
<li>看看AI会给你什么惊喜</li>
</ol>
<p><strong>不要想&quot;什么才值得问&quot;——随便问就对了</strong></p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="25" style="" data-marpit-pagination-total="32" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;" data-marpit-pagination-total="32">
<h1 id="%E5%88%86%E4%BA%AB%E6%97%B6%E5%88%BB">分享时刻</h1>
<p>谁愿意分享：</p>
<ul>
<li>你问了AI什么？</li>
<li>AI给了你什么意想不到的回答？</li>
<li>这个体验，跟你之前对AI的印象有什么不同？</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;--marpit-advanced-background-split:40%;" data-marpit-pagination-total="32" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;../assets/c3-scenario-transfer.png&quot;);"></figure></div></section></foreignObject><foreignObject width="60%" height="720"><section id="27" data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;--marpit-advanced-background-split:40%;" data-marpit-pagination-total="32" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h1 id="%E7%90%86%E5%8F%91%E8%AE%A1%E5%88%92%E2%86%92%E9%94%99%E9%A2%98%E5%88%86%E6%9E%90%E2%86%92%E5%BB%BA%E7%AB%99%E2%86%92%E5%93%81%E7%89%8C%E4%B8%89%E4%B8%AA%E6%9C%88%E7%9A%84%E8%83%BD%E5%8A%9B%E8%B7%83%E8%BF%81%E8%B7%AF%E5%BE%84">理发计划→错题分析→建站→品牌：三个月的能力跃迁路径</h1>
<table>
<thead>
<tr>
<th>时间</th>
<th>里程碑</th>
</tr>
</thead>
<tbody>
<tr>
<td>第1周</td>
<td>理发计划 — 第一个AI产品</td>
</tr>
<tr>
<td>第2周</td>
<td>女儿错题分析 — 拍照问AI推广到教育</td>
</tr>
<tr>
<td>第3周</td>
<td>商家群聊分析 — 应用到工作场景</td>
</tr>
<tr>
<td>第4周</td>
<td>8小时建站 — &quot;我有想法、AI来执行&quot;</td>
</tr>
<tr>
<td>第2月</td>
<td>全公司分享 — 从使用者到布道者</td>
</tr>
<tr>
<td>第3月</td>
<td>SuperME品牌 — 从实践到方法论</td>
</tr>
</tbody>
</table>
<p><strong>每一步的底层逻辑，都是理发店种下的种子</strong></p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="27" style="" data-marpit-pagination-total="32" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;--marpit-advanced-background-split:40%;" data-marpit-pagination-total="32" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;../assets/case-homework.png&quot;);"></figure></div></section></foreignObject><foreignObject width="60%" height="720"><section id="28" data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;--marpit-advanced-background-split:40%;" data-marpit-pagination-total="32" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h1 id="%E5%BB%B6%E4%BC%B8%E6%A1%88%E4%BE%8B%E5%A5%B3%E5%84%BF%E7%9A%84%E9%94%99%E9%A2%98%E6%9C%AC">延伸案例：女儿的错题本</h1>
<p><strong>场景</strong>：辅导作业总是吵架</p>
<p><strong>做法</strong>：</p>
<ul>
<li>拍了作业帮的错题照片</li>
<li>AI分析错误模式</li>
<li>生成1页根因分析 + 60道练习题</li>
</ul>
<p><strong>结果</strong>：</p>
<blockquote>
<p>&quot;女儿说，爸爸你的脾气有点好了，愿意跟我一起玩了。&quot;</p>
</blockquote>
<p><strong>AI改善的不只是效率，还有关系</strong></p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="28" style="" data-marpit-pagination-total="32" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;--marpit-advanced-background-split:40%;" data-marpit-pagination-total="32" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;../assets/case-resume.png&quot;);"></figure></div></section></foreignObject><foreignObject width="60%" height="720"><section id="29" data-paginate="true" data-theme="rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--theme:rwssyinb78r3dksfa5hif3t4kv5h59njxfcdt2y7dj;--marpit-advanced-background-split:40%;" data-marpit-pagination-total="32" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h1 id="%E5%BB%B6%E4%BC%B8%E6%A1%88%E4%BE%8B%E5%A5%B3%E5%84%BF%E7%9A%84%E8%BD%AC%E5%AD%A6%E7%AE%80%E5%8E%86">延伸案例：女儿的转学简历</h1>
<p><strong>场景</strong>：女儿转学需要简历，不知道小学生简历怎么写</p>
<p><strong>做法</strong>：</p>
<ul>
<li>把1-3年级成绩单照片喂给AI</li>
<li>AI生成HTML网页版简历</li>
<li>保存为PDF</li>
</ul>
<p><strong>结果</strong>：10分钟搞定</p>
<blockquote>
<p>老婆震惊，要求也装一个AI</p>
</blockquote>
